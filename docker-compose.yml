services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: threatscan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-threatscan}
      POSTGRES_USER: ${POSTGRES_USER:-threatscan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-threatscan_secret_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-threatscan}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - threatscan

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: threatscan-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - threatscan

  # ── MinIO ──
  minio:
    image: minio/minio:latest
    container_name: threatscan-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin_secret_change_me}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - threatscan

  # ── MinIO Init (create bucket) ──
  minio-init:
    image: minio/mc:latest
    container_name: threatscan-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin_secret_change_me};
      mc mb local/$${MINIO_BUCKET:-threatscan-files} --ignore-existing;
      mc anonymous set none local/$${MINIO_BUCKET:-threatscan-files};
      exit 0;
      "
    networks:
      - threatscan

  # ── FastAPI Backend ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: threatscan-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./yara-rules:/app/yara-rules:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - threatscan

  # ── Celery Worker ──
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: threatscan-worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./yara-rules:/app/yara-rules:ro
    security_opt:
      - no-new-privileges:true
    networks:
      - threatscan

  # ── Celery Beat (scheduler) ──
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: threatscan-beat
    restart: unless-stopped
    env_file: .env
    command: celery -A app.worker.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - threatscan

  # ── Next.js Frontend ──
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: threatscan-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-ThreatScan}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - threatscan

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  threatscan:
    driver: bridge
